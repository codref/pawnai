services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pawn-diarize-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pawn-diarize 
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pawn-diarize"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s

  siyuan:
    image: b3log/siyuan
    command: ['--workspace=/siyuan/workspace/', '--accessAuthCode=12345678']
    ports:
      - 6806:6806
    volumes:
      - siyuan_workspace:/siyuan/workspace
    restart: unless-stopped
    environment:
      # A list of time zone identifiers can be found at https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
      - TZ=${YOUR_TIME_ZONE}
      #- PUID=${YOUR_USER_PUID}  # Customize user ID
      #- PGID=${YOUR_USER_PGID}  # Customize group ID

volumes:
  pgdata:
    driver: local
  siyuan_workspace:
    driver: local
