# litellm proxy configuration for pawn-agent
#
# The pawn-agent server exposes a native OpenAI-compatible API at
# POST /v1/chat/completions, so the built-in openai provider is used directly.
#
# Start the proxy:
#   litellm --config litellm_config.yaml
#
# The proxy listens on http://localhost:4000 and forwards to pawn-agent.
#
# Session management: set the OpenAI `user` field to your session ID.
# The same session_id resumes the conversation stored in pawn-agent's PostgreSQL.
#
# Model selection: set the `model` field to the pawn_agent model string:
#   pawn_agent                              → use server-configured default
#   openai:gpt-4o                           → override to openai:gpt-4o
#   anthropic:claude-3-5-sonnet-latest      → override to that model
#
# Environment variables:
#   PAWN_AGENT_URL    — server base URL including /v1 (default: http://localhost:8000/v1)
#   PAWN_AGENT_TOKEN  — Bearer token matching api.token in pawnai.yaml

model_list:
  - model_name: pawn-agent
    litellm_params:
      model: openai/pawn_agent
      api_base: "os.environ/PAWN_AGENT_URL"    # must end with /v1, e.g. http://localhost:8000/v1
      api_key: "os.environ/PAWN_AGENT_TOKEN"   # set this env var; use any non-empty string for open-access dev mode

  # Named aliases for specific model overrides (add as needed)
  # - model_name: pawn-agent-gpt4o
  #   litellm_params:
  #     model: openai/openai:gpt-4o
  #     api_base: "os.environ/PAWN_AGENT_URL"
  #     api_key: "os.environ/PAWN_AGENT_TOKEN"

litellm_settings:
  # Silently drop OpenAI params unsupported by pawn-agent (presence_penalty, seed, etc.)
  drop_params: true
