# litellm proxy configuration for pawn-agent
#
# The pawn-agent server exposes a native OpenAI-compatible API at
# POST /v1/chat/completions, so the built-in openai provider is used directly.
#
# Start the proxy:
#   litellm --config litellm_config.yaml
#
# The proxy listens on http://localhost:4000 and forwards to pawn-agent.
#
# Session management: set the OpenAI `user` field to your session ID.
# The same session_id resumes the conversation stored in pawn-agent's PostgreSQL.
#
# Model selection: set the `model` field to the pawn_agent model string:
#   pawn_agent                              → use server-configured default
#   openai:gpt-4o                           → override to openai:gpt-4o
#   anthropic:claude-3-5-sonnet-latest      → override to that model
#
# Environment variables:
#   PAWN_AGENT_URL    — server base URL including /v1 (default: http://localhost:8000/v1)
#   PAWN_AGENT_TOKEN  — Bearer token matching api.token in pawnai.yaml

model_list:
  - model_name: pawn-agent
    litellm_params:
      model: openai/pawn_agent
      api_base: "os.environ/PAWN_AGENT_URL"    # must end with /v1, e.g. http://localhost:8000/v1
      api_key: "os.environ/PAWN_AGENT_TOKEN"   # set this env var; use any non-empty string for open-access dev mode

  # Named aliases for specific model overrides (add as needed)
  # - model_name: pawn-agent-gpt4o
  #   litellm_params:
  #     model: openai/openai:gpt-4o
  #     api_base: "os.environ/PAWN_AGENT_URL"
  #     api_key: "os.environ/PAWN_AGENT_TOKEN"

  # Audio transcription — routes POST /v1/audio/transcriptions to pawn-agent.
  # litellm forwards multipart uploads unchanged; pawn-agent always uses Parakeet.
  # The model string must start with "openai/" so litellm takes the OpenAI path.
  #
  # curl example:
  #   curl http://localhost:4000/v1/audio/transcriptions \
  #     -F "file=@recording.wav" -F "model=pawn-transcribe"
  #
  # OpenAI Python SDK:
  #   client = OpenAI(base_url="http://localhost:4000/v1", api_key="...")
  #   t = client.audio.transcriptions.create(model="pawn-transcribe", file=open("recording.wav","rb"))
  #   print(t.text)
  - model_name: pawn-transcribe
    litellm_params:
      model: openai/whisper-1            # any value; pawn-agent ignores it
      api_base: "os.environ/PAWN_AGENT_URL"
      api_key: "os.environ/PAWN_AGENT_TOKEN"
      mode: audio_transcription          # tells litellm to POST to /v1/audio/transcriptions

  # Text-to-speech — routes POST /v1/audio/speech to pawn-agent (Kokoro TTS).
  # Supports languages via the non-standard `language` field in extra_body.
  #
  # curl example (direct to pawn-agent, no proxy needed for TTS):
  #   curl http://localhost:8000/v1/audio/speech \
  #     -H "Content-Type: application/json" \
  #     -d '{"model":"tts-1","input":"Hello world","voice":"alloy","response_format":"wav"}' \
  #     -o out.wav
  #
  # Python SDK (direct):
  #   client = OpenAI(base_url="http://localhost:8000/v1", api_key="...")
  #   resp = client.audio.speech.create(model="tts-1", input="Hello", voice="alloy",
  #                                     extra_body={"language": "en"})
  #   resp.stream_to_file("out.wav")
  #
  # Python SDK (via proxy):
  #   client = OpenAI(base_url="http://localhost:4000/v1", api_key="...")
  #   resp = client.audio.speech.create(model="pawn-tts", input="Hello", voice="alloy")
  #   resp.stream_to_file("out.wav")
  #
  # Italian example:
  #   resp = client.audio.speech.create(model="pawn-tts", input="Ciao mondo",
  #                                     voice="alloy", extra_body={"language": "it"})
  - model_name: pawn-tts
    litellm_params:
      model: openai/tts-1                # any value; pawn-agent ignores it
      api_base: "os.environ/PAWN_AGENT_URL"
      api_key: "os.environ/PAWN_AGENT_TOKEN"
      mode: audio_speech                 # tells litellm to POST to /v1/audio/speech

litellm_settings:
  # Silently drop OpenAI params unsupported by pawn-agent (presence_penalty, seed, etc.)
  drop_params: true
