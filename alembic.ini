# Alembic configuration for pawn-diarize
# Run migrations: alembic upgrade head
# Generate a new migration: alembic revision -m "describe change"
# Autogenerate from ORM changes: alembic revision --autogenerate -m "describe change"

[alembic]
script_location = migrations

# sqlalchemy.url is intentionally omitted — the DSN is read from the
# DATABASE_URL environment variable (or the default) inside migrations/env.py.

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
